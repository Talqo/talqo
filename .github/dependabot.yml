version: 2

updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown] Project supply-chain policy.
    open-pull-requests-limit: 10
    groups:
      bun-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Etc/UTC
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown] Project supply-chain policy.
    open-pull-requests-limit: 10
    groups:
      actions-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
